<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#121212" />
    <title>Kalakar | Pro-Hiring Network</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Yatra+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/src/index.css">
  </head>
  <body>
    <!-- SHIROREKHA SPLASH SCREEN -->
    <div id="splash-screen" class="splash-container">
      <div class="logo-wrapper">
        <span class="kalakar-logo-text">kalakar
          <svg class="shirorekha-svg" viewBox="0 0 100 10" preserveAspectRatio="none">
            <path d="M 0 5 Q 50 2, 100 5" stroke="var(--brand-gold)" stroke-width="4" fill="none" class="draw-line" />
          </svg>
        </span>
      </div>
      <p id="loading-phrase" class="splash-tagline">Setting the Stage...</p>
    </div>

    <!-- TOAST CONTAINER -->
    <div id="toast-container"></div>

    <!-- APP FRAME (Centers on desktop, mobile-first width) -->
    <div id="app-frame" class="app-frame">

    <!-- LOGIN VIEW -->
    <section data-view="login" class="view hidden">
      <div class="glass-panel rounded-2xl p-8 w-full max-w-md mx-auto">
        <h1 class="font-poppins text-3xl font-bold text-gold text-center mb-2">kalakar</h1>
        <p class="text-muted text-center text-sm mb-8">Where talent meets opportunity</p>

        <button id="google-login-btn" class="btn-google btn-full mb-6">
          <svg class="w-5 h-5" viewBox="0 0 24 24" aria-hidden="true">
            <path fill="#EA4335" d="M12 11.8v3.6h5.1c-.2 1.2-.9 2.2-1.9 2.9v2.4h3.1c1.8-1.6 2.9-4.1 2.9-6.9 0-.6-.1-1.1-.2-1.6H12z"/>
            <path fill="#34A853" d="M12 24c2.6 0 4.8-.9 6.4-2.4l-3.1-2.4c-.9.6-2 .9-3.3.9-2.5 0-4.7-1.7-5.5-4.1H3.3v2.6C4.9 21.5 8.2 24 12 24z"/>
            <path fill="#4A90E2" d="M6.5 14c-.2-.6-.3-1.3-.3-2s.1-1.4.3-2V7.4H3.3C2.5 9 2 10.9 2 12s.5 3 1.3 4.6l3.2-2.6z"/>
            <path fill="#FBBC05" d="M12 4.8c1.4 0 2.6.5 3.6 1.4l2.7-2.7C16.8 1.3 14.6.4 12 .4 8.2.4 4.9 2.5 3.3 5.8l3.2 2.6c.8-2.4 3-4.1 5.5-4.1z"/>
          </svg>
          Continue with Google
        </button>

        <div class="flex items-center gap-4 mb-6">
          <div class="h-px flex-1 bg-white/10"></div>
          <span class="text-xs text-muted uppercase tracking-widest">or</span>
          <div class="h-px flex-1 bg-white/10"></div>
        </div>

        <input id="email-input" type="email" placeholder="Enter your email" class="input-field mb-3" />
        <button id="email-link-btn" class="btn-gold btn-full">Send sign-in link</button>
        <p id="email-link-hint" class="hidden text-xs text-green-400 text-center mt-3">Check your inbox! We sent you a sign-in link.</p>
      </div>
    </section>

    <!-- APP SHELL -->
    <div id="app-shell" class="hidden h-screen flex flex-col bg-void text-primary overflow-hidden">
      
      <!-- TOP NAV (Desktop Only) -->
      <nav id="top-nav" class="hidden md:flex sticky top-0 w-full h-16 glass-panel border-b border-strong z-50 px-4 items-center justify-between">
        <div class="flex items-center gap-8">
          <a href="#stage" class="font-poppins text-gold text-2xl font-bold tracking-wide">kalakar</a>
        </div>
        <div class="flex items-center gap-6">
          <a href="#stage" class="nav-link active">Stage</a>
          <a href="#explore" class="nav-link">Discovery</a>
          <button id="top-create-btn" class="btn-gold px-4 py-2 rounded-full text-sm">Post Talent</button>
          <a href="#deals-list" class="nav-link">My Deals</a>
          <div class="relative group cursor-pointer">
            <img id="nav-avatar" src="/assets/default-avatar.svg" class="w-8 h-8 rounded-full border border-strong object-cover bg-surface">
          </div>
        </div>
      </nav>

      <!-- MAIN CONTENT -->
      <main id="main-content" class="flex-1 overflow-hidden relative">
        
        <!-- STAGE (Feed) -->
        <section data-view="stage" class="view hidden h-full">
          <div id="stage-feed" class="h-full"></div>
        </section>

        <!-- DISCOVERY (Explore) -->
        <section data-view="explore" class="view hidden max-w-4xl mx-auto p-4 md:p-6 overflow-y-auto h-full pb-32">
          <div class="flex items-center justify-between mb-8 px-2">
            <h2 class="text-3xl font-poppins font-bold text-white">Discovery</h2>
          </div>
          <div id="explore-content"></div>
        </section>

        <!-- MY DEALS (Status/Chat Dashboard) -->
        <section data-view="deals-list" class="view hidden max-w-4xl mx-auto p-4 md:p-6 overflow-y-auto h-full pb-32">
          <div class="flex items-center justify-between mb-8 px-2">
            <h2 class="text-3xl font-poppins font-bold text-white">My Deals</h2>
          </div>
          <div id="deals-list-content"></div>
        </section>

        <!-- PROFILE (Portfolio) -->
        <section data-view="profile" class="view hidden max-w-4xl mx-auto p-4 md:p-6 overflow-y-auto h-full pb-32">
          <div id="profile-content"></div>
        </section>

        <!-- DEAL ROOM (Detail/Messaging) -->
        <section data-view="deal" class="view hidden max-w-3xl mx-auto p-4 md:p-6 overflow-y-auto h-full pb-32">
          <div id="deal-room"></div>
        </section>

      </main>

      <!-- BOTTOM NAV -->
      <nav id="bottom-nav" class="bottom-nav md:hidden fixed bottom-0 w-full glass-panel border-t border-strong z-50 pb-safe">
        <div class="bottom-nav__inner">
          <a href="#stage" class="nav-item bottom-tab" data-tab="stage">
            <i data-lucide="home"></i><span class="text-[10px] mt-1">Stage</span>
          </a>
          <a href="#explore" class="nav-item bottom-tab" data-tab="explore">
            <i data-lucide="compass"></i><span class="text-[10px] mt-1">Discovery</span>
          </a>

          <div class="bottom-nav__spacer" aria-hidden="true"></div>

          <a href="#deals-list" class="nav-item bottom-tab relative" data-tab="deals-list">
            <i data-lucide="layers"></i><span class="text-[10px] mt-1">Deals</span>
            <span id="notif-badge-mobile" class="badge hidden absolute -top-1 right-2">0</span>
          </a>
          <a href="#profile" class="nav-item bottom-tab" data-tab="profile">
            <i data-lucide="user"></i><span class="text-[10px] mt-1">Profile</span>
          </a>

          <button id="create-fab" class="create-fab" aria-label="Post talent">
            <i data-lucide="plus"></i>
          </button>
        </div>
      </nav>

    </div>

    </div> <!-- /#app-frame -->

    <!-- MODALS -->
    <div id="post-composer" class="hidden fixed inset-0 z-[100] bg-black/80 backdrop-blur-sm flex items-end md:items-center justify-center">
      <div class="bg-void w-full md:w-[600px] md:rounded-xl border border-strong flex flex-col max-h-[90vh] animate-slide-up">
        <div class="flex justify-between items-center p-4 border-b border-strong">
          <h3 class="font-poppins font-semibold">Post Talent Performance</h3>
          <button id="close-composer-btn" class="text-muted hover:text-white text-xl">✕</button>
        </div>
        <div class="p-6">
          <textarea id="post-text" class="w-full bg-transparent border border-strong rounded-xl text-white resize-none outline-none min-h-[120px] text-base p-4" placeholder="Describe the performance or role..."></textarea>
          <button id="submit-post-btn" class="btn-gold w-full py-4 mt-6 rounded-full font-bold">Post Performance ✦</button>
        </div>
      </div>
    </div>

    <!-- HIRE MODAL -->
    <div id="hire-modal" class="hidden fixed inset-0 z-[110] bg-black/80 backdrop-blur-sm flex items-end md:items-center justify-center p-4">
      <div class="bg-void w-full md:w-[640px] md:rounded-3xl border border-gold/20 flex flex-col max-h-[90vh] animate-slide-up overflow-hidden">
        <div class="p-6 border-b border-gold/10 bg-gold/5">
          <h3 id="hire-modal-title" class="text-2xl font-poppins font-bold text-white">Hire Request</h3>
          <p id="hire-target-sub" class="text-xs text-gold font-bold uppercase tracking-widest mt-1">Direct Recruitment</p>
        </div>
        
        <div id="hire-actions" class="p-6 grid grid-cols-1 gap-4">
          <button class="glass-panel p-5 text-left hover:bg-gold/10 transition-colors hire-action-btn rounded-2xl group" data-action="hire">
            <div class="font-bold text-white text-lg group-hover:text-gold transition-colors">Start Paid Project</div>
            <div class="text-xs text-muted mt-1 leading-relaxed">Verified hiring flow with status tracking and pro protection.</div>
          </button>
          <button class="glass-panel p-5 text-left hover:bg-white/5 transition-colors hire-action-btn rounded-2xl" data-action="collab">
            <div class="font-bold text-white">Industry Collaboration</div>
            <div class="text-xs text-muted mt-1">Propose a mutual project or portfolio expansion.</div>
          </button>
          <button class="glass-panel p-5 text-left hover:bg-white/5 transition-colors hire-action-btn rounded-2xl" data-action="message">
            <div class="font-bold text-white">Inquiry</div>
            <div class="text-xs text-muted mt-1">Send a professional inquiry or ask for availability.</div>
          </button>
        </div>

        <form id="deal-form" class="hidden p-6">
          <div class="space-y-4">
            <input id="deal-projectTitle" class="input-field" placeholder="Project name">
            <input id="deal-roleRequired" class="input-field" placeholder="Professional role (e.g. Lead Editor)">
            <textarea id="deal-message" class="input-field" rows="3" placeholder="Project brief or message..."></textarea>
          </div>
          <div class="flex gap-3 mt-8">
            <button type="button" id="deal-back-btn" class="btn-ghost px-6">Back</button>
            <button type="submit" id="deal-submit-btn" class="btn-gold flex-1 py-4 font-bold rounded-full shadow-lg shadow-gold/20">Send Hire Request ✦</button>
          </div>
        </form>
      </div>
    </div>

    <script src="/vendor/lucide.min.js"></script>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
